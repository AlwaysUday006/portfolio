<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script>
    // Redirect all requests back to the main SPA root folder
    const path = window.location.pathname;
    const isSubfolder = path.includes('/my_portfolio/');
    const redirectUrl = isSubfolder ? '/my_portfolio/' : '/';
    window.location.replace(redirectUrl);
  </script>
</head>
<body style="background-color: #07070a; color: #94a3b8; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0;">
  <div style="text-align: center; max-width: 400px; padding: 20px;">
    <h1 style="color: white; margin-bottom: 10px; font-weight: normal;">Redirecting to Home...</h1>
    <p style="font-size: 14px; margin-bottom: 20px;">We couldn't find the page you were looking for. Please wait while we take you back to the portfolio.</p>
    <a href="./" style="display: inline-block; padding: 10px 20px; background-color: white; color: black; text-decoration: none; border-radius: 999px; font-size: 12px; font-weight: bold;">Go to Home</a>
  </div>
</body>
</html>
